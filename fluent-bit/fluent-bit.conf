# =============================================================================
# Fluent Bit config for Firewalla Gold SE → Axiom
#
# Ships Zeek dns.log, conn.log, and ssl.log to Axiom for long-term retention
# and search. Zeek logs on recent Firewalla firmware are JSON format.
#
# Environment variables (set in log_shipping.env):
#   AXIOM_DATASET     — Axiom dataset name for log events
#   AXIOM_API_TOKEN   — Axiom API token with Ingest permission
# =============================================================================

[SERVICE]
    Flush           10
    Log_Level       warn
    Parsers_File    /fluent-bit/etc/parsers.conf
    storage.path    /fluent-bit/data/
    storage.total_limit_size 50M

# --- Zeek DNS logs -----------------------------------------------------------
# Every DNS query on your network: source IP, domain, query type, response.
# This is the core dataset for "what domains did each device visit."
# -----------------------------------------------------------------------------
[INPUT]
    Name            tail
    Tag             zeek.dns
    Path            /logs/zeek/dns.log
    Exclude_Path    *.gz
    Parser          zeek_tsv
    Read_from_Head  false
    Refresh_Interval 2
    DB              /fluent-bit/data/dns.db
    Rotate_Wait     30
    Skip_Empty_Lines on

# --- Zeek connection logs ----------------------------------------------------
# Every TCP/UDP/ICMP connection: source, dest, port, bytes, duration.
# Ties DNS lookups to actual traffic volume.
# -----------------------------------------------------------------------------
[INPUT]
    Name            tail
    Tag             zeek.conn
    Path            /logs/zeek/conn.log
    Exclude_Path    *.gz
    Parser          zeek_tsv
    Read_from_Head  false
    Refresh_Interval 2
    DB              /fluent-bit/data/conn.db
    Rotate_Wait     30
    Skip_Empty_Lines on

# --- Zeek TLS/SSL logs -------------------------------------------------------
# Every TLS handshake: source, dest, SNI (server_name), TLS version, cipher,
# JA3-style ssl_history, cert chain fingerprints, and validation status.
# In an HTTPS-dominant network DNS shows the lookup but SSL shows what was
# actually connected to — the difference between "looked up youtube.com" and
# "established a TLS session with youtube.com."
# -----------------------------------------------------------------------------
[INPUT]
    Name            tail
    Tag             zeek.ssl
    Path            /logs/zeek/ssl.log
    Exclude_Path    *.gz
    Parser          zeek_tsv
    Read_from_Head  false
    Refresh_Interval 2
    DB              /fluent-bit/data/ssl.db
    Rotate_Wait     30
    Skip_Empty_Lines on

# --- Firewalla ACL/audit logs ------------------------------------------------
# Blocked connections from Firewalla iptables rules. Source is acl-audit.log
# (kernel/iptables FW_ADT lines). The historical acl-alarm.log path has been
# 0 bytes on recent firmware — the active block stream is acl-audit.log.
# -----------------------------------------------------------------------------
[INPUT]
    Name            tail
    Tag             firewalla.acl
    Path            /logs/alog/acl-audit.log
    Read_from_Head  false
    Refresh_Interval 5
    DB              /fluent-bit/data/acl.db

# --- Drop Zeek header/comment lines ------------------------------------------
[FILTER]
    Name    grep
    Match   zeek.*
    Exclude log ^#

# --- Add source labels -------------------------------------------------------
[FILTER]
    Name    modify
    Match   zeek.dns
    Add     log_source zeek_dns

[FILTER]
    Name    modify
    Match   zeek.conn
    Add     log_source zeek_conn

[FILTER]
    Name    modify
    Match   zeek.ssl
    Add     log_source zeek_ssl

[FILTER]
    Name    modify
    Match   firewalla.acl
    Add     log_source firewalla_acl

# --- Output to Axiom ---------------------------------------------------------
[OUTPUT]
    Name              http
    Match             *
    Host              api.axiom.co
    Port              443
    URI               /v1/datasets/${AXIOM_DATASET}/ingest
    Header            Authorization Bearer ${AXIOM_API_TOKEN}
    Header            Content-Type application/json
    Format            json
    Json_date_key     _time
    Json_date_format  iso8601
    TLS               on
    Retry_Limit       False
    Compress          gzip

# --- Output to Grafana Cloud Loki (DIRECT) ----------------------------------
# Ships the same events to Grafana Cloud Loki, pushing DIRECTLY to Cloud Loki —
# no LAN relay. The Firewalla owns its own log shipping, mirroring the per-host
# Alloy push model in lentago/homelab-observability (no central chokepoint).
# Replaces the previous hop through the Alloy `loki.source.api` receiver at
# 192.168.139.20:3100, which had silently stopped delivering (Loki empty for
# 36h+; Axiom unaffected). The receiver can be retired from the central Alloy
# config once this is confirmed.
#
# cluster=homelab is added here (no relay to add external_labels) so the
# existing Grafana queries ({log_source="zeek_dns|...", cluster="homelab"})
# keep working; log_source is promoted from the record to a Loki label.
# Creds come from log_shipping.env (GRAFANA_CLOUD_LOGS_*), never from git.
# -----------------------------------------------------------------------------
[OUTPUT]
    Name              loki
    Match             *
    Host              ${GRAFANA_CLOUD_LOGS_HOST}
    Port              443
    TLS               on
    TLS.Verify        on
    HTTP_User         ${GRAFANA_CLOUD_LOGS_USER}
    HTTP_Passwd       ${GRAFANA_CLOUD_LOGS_TOKEN}
    Labels            job=firewalla, cluster=homelab
    Label_keys        $log_source
    Auto_Kubernetes_Labels off
    Compress          gzip
    # Retry forever (matches the Axiom output above). storage.total_limit_size
    # bounds the on-disk backlog during a Loki outage. See issue #43.
    Retry_Limit       False
